name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        env:
          SCREENCLEAN_TELEMETRY_URL: ${{ secrets.SCREENCLEAN_TELEMETRY_URL }}
          SCREENCLEAN_TELEMETRY_KEY: ${{ secrets.SCREENCLEAN_TELEMETRY_KEY }}
        run: pyinstaller DesktopCleaner.spec

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ScreenClean.exe
          generate_release_notes: true
