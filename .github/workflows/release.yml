name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        env:
          SCREENCLEAN_TELEMETRY_URL: ${{ secrets.SCREENCLEAN_TELEMETRY_URL }}
          SCREENCLEAN_TELEMETRY_KEY: ${{ secrets.SCREENCLEAN_TELEMETRY_KEY }}
        run: pyinstaller DesktopCleaner.spec

      - name: Generate installer assets
        run: python installer/generate_assets.py

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\ScreenClean.iss'

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ScreenClean.exe
            dist/ScreenClean-Setup.exe
          generate_release_notes: true
